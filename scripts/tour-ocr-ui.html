<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tour OCR JSON</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #667085;
      --border: #d8dde6;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      min-height: calc(100vh - 65px);
    }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .controls, .output { padding: 18px; }
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dropzone {
      display: grid;
      place-items: center;
      min-height: 190px;
      padding: 18px;
      border: 1.5px dashed #98a2b3;
      border-radius: 8px;
      background: #fbfcfd;
      cursor: pointer;
      text-align: center;
    }
    .dropzone.dragging {
      border-color: var(--accent);
      background: #ecfdf5;
    }
    .drop-title {
      font-weight: 700;
      margin-bottom: 8px;
    }
    .drop-meta, .hint, .summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    input[type="file"] { display: none; }
    .preview {
      display: none;
      width: 100%;
      max-height: 220px;
      margin-top: 12px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    label {
      display: block;
      color: #344054;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    input {
      height: 38px;
      padding: 0 10px;
    }
    textarea {
      min-height: calc(100vh - 180px);
      padding: 12px;
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    button {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: var(--accent-strong); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .message { margin-top: 12px; color: var(--muted); font-size: 13px; min-height: 20px; }
    .message.error { color: var(--danger); }
    .summary { min-height: 20px; }
    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; padding: 12px; }
      textarea { min-height: 360px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tour OCR JSON</h1>
    <span class="status" id="health">Đang kiểm tra Azure</span>
  </header>
  <main>
    <section class="controls">
      <form id="form">
        <label for="file">Ảnh hoặc PDF chương trình</label>
        <div class="dropzone" id="dropzone">
          <div>
            <div class="drop-title" id="fileName">Chọn file</div>
            <div class="drop-meta">PNG, JPG, TIFF, BMP hoặc PDF</div>
          </div>
        </div>
        <input id="file" name="file" type="file" accept="image/*,.pdf">
        <img class="preview" id="preview" alt="Xem trước ảnh tour">
        <div class="grid">
          <div>
            <label for="year">Năm</label>
            <input id="year" name="year" inputmode="numeric">
          </div>
          <div>
            <label for="company">Công ty fallback</label>
            <input id="company" name="company" placeholder="Để trống để lấy từ ảnh">
          </div>
          <div>
            <label for="nationality">Quốc tịch nếu ảnh không ghi</label>
            <input id="nationality" name="nationality" placeholder="VD: USA">
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="analyze" type="submit">Nhận dạng</button>
          <button id="reset" type="button">Xóa</button>
        </div>
        <div class="message" id="message"></div>
      </form>
    </section>
    <section class="output">
      <div class="row">
        <div>
          <label for="json">JSON import</label>
          <div class="summary" id="summary"></div>
        </div>
        <div class="actions">
          <button id="copy" type="button" disabled>Copy</button>
          <button id="download" type="button" disabled>Tải JSON</button>
        </div>
      </div>
      <textarea id="json" readonly spellcheck="false"></textarea>
    </section>
  </main>
  <script>
    const fileInput = document.querySelector('#file');
    const dropzone = document.querySelector('#dropzone');
    const fileName = document.querySelector('#fileName');
    const preview = document.querySelector('#preview');
    const form = document.querySelector('#form');
    const message = document.querySelector('#message');
    const output = document.querySelector('#json');
    const copyButton = document.querySelector('#copy');
    const downloadButton = document.querySelector('#download');
    const analyzeButton = document.querySelector('#analyze');
    const health = document.querySelector('#health');
    const summary = document.querySelector('#summary');
    document.querySelector('#year').value = new Date().getFullYear();
    const setMessage = (text, isError = false) => {
      message.textContent = text;
      message.className = isError ? 'message error' : 'message';
    };
    const setFile = (file) => {
      if (!file) return;
      const transfer = new DataTransfer();
      transfer.items.add(file);
      fileInput.files = transfer.files;
      fileName.textContent = file.name;
      if (file.type.startsWith('image/')) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.removeAttribute('src');
        preview.style.display = 'none';
      }
    };
    const setOutput = (payload) => {
      output.value = JSON.stringify(payload.importJson, null, 2);
      const meta = payload.meta || {};
      summary.textContent = [meta.tourCode, meta.startDate && `${meta.startDate} - ${meta.endDate}`, meta.totalGuests && `${meta.totalGuests} khách`]
        .filter(Boolean)
        .join(' | ');
      copyButton.disabled = !output.value;
      downloadButton.disabled = !output.value;
    };
    fetch('/api/health')
      .then((res) => res.json())
      .then((data) => {
        health.textContent = data.hasEndpoint && data.hasKey ? `Azure sẵn sàng (${data.apiVersion})` : 'Thiếu cấu hình Azure';
      })
      .catch(() => { health.textContent = 'Không kết nối server'; });
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
    ['dragenter', 'dragover'].forEach((eventName) => dropzone.addEventListener(eventName, (event) => {
      event.preventDefault();
      dropzone.classList.add('dragging');
    }));
    ['dragleave', 'drop'].forEach((eventName) => dropzone.addEventListener(eventName, (event) => {
      event.preventDefault();
      dropzone.classList.remove('dragging');
    }));
    dropzone.addEventListener('drop', (event) => setFile(event.dataTransfer.files[0]));
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const file = fileInput.files[0];
      if (!file) {
        setMessage('Vui lòng chọn ảnh hoặc PDF.', true);
        return;
      }
      const data = new FormData(form);
      analyzeButton.disabled = true;
      setMessage('Đang gọi Azure...');
      try {
        const response = await fetch('/api/analyze', { method: 'POST', body: data });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || 'OCR failed');
        setOutput(payload);
        setMessage('Đã tạo JSON.');
      } catch (error) {
        setMessage(error.message || 'Không thể nhận dạng file.', true);
      } finally {
        analyzeButton.disabled = false;
      }
    });
    document.querySelector('#reset').addEventListener('click', () => {
      form.reset();
      document.querySelector('#year').value = new Date().getFullYear();
      document.querySelector('#company').value = '';
      document.querySelector('#nationality').value = '';
      fileName.textContent = 'Chọn file';
      preview.style.display = 'none';
      output.value = '';
      summary.textContent = '';
      copyButton.disabled = true;
      downloadButton.disabled = true;
      setMessage('');
    });
    copyButton.addEventListener('click', async () => {
      await navigator.clipboard.writeText(output.value);
      setMessage('Đã copy JSON.');
    });
    downloadButton.addEventListener('click', () => {
      const blob = new Blob([output.value], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'tour-import-from-image.json';
      link.click();
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>
